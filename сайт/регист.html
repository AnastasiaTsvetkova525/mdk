<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        /* Центрируем форму на экране и задаем серый фон для страницы */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Стили бежевого контейнера формы */
        .reg-container {
            background-color: #e3dac9; /* Бежевый цвет как на картинке */
            padding: 40px;
            width: 550px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: normal;
        }

        /* Верстка полей в виде таблицы/сетки для ровного выравнивания */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group label {
            width: 150px; /* Фиксированная ширина для текста слева */
            font-size: 16px;
        }

        /* Стили текстовых полей ввода */
        .form-group input {
            flex-top: 1;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ff4d4d; /* Красная рамка как на макете */
            outline: none;
            box-sizing: border-box;
        }

        /* Текст соглашения */
        .agreement-text {
            font-size: 12px;
            color: #333;
            line-height: 1.4;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        /* Чекбокс и подпись к нему */
        .checkbox-group {
            display: flex;
            align-items: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .checkbox-group input {
            margin-right: 10px;
            transform: scale(1.2); /* Немного увеличиваем чекбокс */
        }

        /* Кнопка регистрации */
        .btn-container {
            display: flex;
            justify-content: flex-end; /* Сдвигаем кнопку вправо */
        }

        .submit-btn {
            background-color: #ffffff;
            border: 1px solid #ccc;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="reg-container">
        <h2>Регистрация</h2>
    <div class="card">
        <form id="registrationForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="regEmail" placeholder="Ваш E-mail" required>
            </div>
            <div class="form-group">
                <label>Номер телефона</label>
                <input type="text" id="regPhone" placeholder="Ваш номер телефона" required>
            </div>
            <div class="form-group">
                <label>Дата рождения</label>
                 <input type="text" id="regBirthdate" placeholder="ДД.ММ.ГГГГ" maxlength="10" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="Придумайте пароль" required>
            </div>
            <div class="btn-container">
                <button type="submit" class="submit-btn">Зарегистрироваться</button>
            </div>
        </form>
    </div>
</main>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Запрещаем перезагрузку страницы формой

        // 1. Собираем данные в объект
        const newUser = {
            email: document.getElementById('regEmail').value,
            phone: document.getElementById('regPhone').value,
            birthdate: document.getElementById('regBirthdate').value,
            password: document.getElementById('regPassword').value
        };

        // 2. Записываем в хранилище под ключом 'currentUser'
        localStorage.setItem('currentUser', JSON.stringify(newUser));

        alert('Регистрация прошла успешно!');
        
        // 3. Переходим на страницу личного кабинета
        window.location.href = 'личный кабинет.html';
    });
</script>
</body>
</html>
